<!DOCTYPE html>
<html lang="sd" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pak Skill Labor Market Place</title>
    <style>
        :root { --primary: #004d40; --secondary: #1b5e20; --bg: #f4f7f6; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); }
        .app { max-width: 600px; margin: auto; background: #fff; min-height: 100vh; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .form { padding: 20px; }
        .group { margin-bottom: 15px; text-align: right; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .calc { background: #e8f5e9; padding: 15px; border-radius: 10px; margin: 20px 0; border-right: 5px solid var(--secondary); }
        .btn { background: var(--secondary); color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="app">
    <header>
        <h1 style="margin:0;">Pak Skill Labor Market 🇵🇰</h1>
        <p>پاڪستان جو پنهنجو پليٽ فارم</p>
    </header>
    <div class="form">
        <div class="group">
            <label>پورهيت جو نالو:</label>
            <input type="text" id="name" placeholder="مثال: محمد اسلم / مسمات بي بي">
        </div>
        <div class="group">
            <label>هنر (Skill) چونڊيو:</label>
            <select id="skill">
                <option value="">-- ڪيٽيگري چونڊيو --</option>
                <optgroup label="گهريلو خدمتون">
                    <option>ڪم واري مائي (House Maid)</option>
                    <option>باورچي (Cook)</option>
                    <option>ٻارن جي سنڀال (Nanny)</option>
                </optgroup>
                <optgroup label="ٽيڪنيڪل">
                    <option>اليڪٽريشن (Electrician)</option>
                    <option>سولر ماهر (Solar)</option>
                    <option>موٽر وائينڊنگ (Motor Winding)</option>
                    <option>اي سي مستري (AC Tech)</option>
                    <option>گيراج مستري (Mechanic)</option>
                </optgroup>
                <optgroup label="ٻيا هنر">
                    <option>ڊرائيور (Driver)</option>
                    <option>راڄو مستري (Mason)</option>
                    <option>واڍو (Carpenter)</option>
                    <option>درزي (Tailor)</option>
                </optgroup>
            </select>
        </div>
        <div class="group">
            <label>سڃاڻپ ڪارڊ (CNIC):</label>
            <input type="number" placeholder="42101XXXXXXXXX">
        </div>
        <div class="group">
            <label>ڪم جي فيس (روپيا):</label>
            <input type="number" id="fee" placeholder="فيس لکو" oninput="calc()">
        </div>
        <div class="calc">
            ائپ ڪميشن (10%): <span id="comm">0</span> روپيا <br>
            <strong>صاف ڪمائي: <span id="net">0</span> روپيا</strong>
        </div>
        <button class="btn" onclick="alert('درخواست موڪلي وئي!')">رجسٽريشن ڪريو</button>
    </div>
</div>
<script>
    function calc() {
        let f = document.getElementById('fee').value;
        if(f > 0) {
            let c = Math.round(f * 0.10);
            document.getElementById('comm').innerText = c;
            document.getElementById('net').innerText = (f - c);
        }
    }
</script>
</body>
</html>
